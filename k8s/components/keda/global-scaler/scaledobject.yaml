---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/keda.sh/scaledobject_v1alpha1.json
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ${APP}-global-scaler
spec:
  advanced:
    restoreToOriginalReplicaCount: true
  cooldownPeriod: 0
  minReplicaCount: 0
  maxReplicaCount: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: ${CONTROLLER:=Deployment}
    name: ${APP}
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-operated.monitoring.svc.cluster.local:9090
        query: |
          min(
            max_over_time(probe_success{instance="qnap.dom.lan:2049"}[1m]) *
            max_over_time(probe_success{instance="nfs.dom.lan:2049"}[1m]) *
            max_over_time(probe_success{instance="nfs2.dom.lan:2049"}[1m])
          )
        threshold: "1"
        ignoreNullValues: "0"
