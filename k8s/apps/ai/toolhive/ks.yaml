---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: toolhive-operator-crds
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: toolhive-operator-crds
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: toolhive-operator-crds
      namespace: ai
  interval: 1h
  path: "./k8s/apps/ai/toolhive/crds"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: ai
  timeout: 5m
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: toolhive-operator
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: toolhive-operator
  dependsOn:
    - name: toolhive-operator-crds
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: toolhive-operator
      namespace: ai
  interval: 1h
  path: "./k8s/apps/ai/toolhive/app"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: ai
  timeout: 5m
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: toolhive-operator-config
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: toolhive-operator-config
  components:
    - ../../../../components/dragonfly
  dependsOn:
    - name: toolhive-operator-crds
    - name: dragonfly-operator
  healthCheckExprs:
    - apiVersion: dragonflydb.io/v1alpha1
      kind: Dragonfly
      failed: status.phase != 'ready'
      current: status.phase == 'ready'
  interval: 1h
  path: "./k8s/apps/ai/toolhive/config"
  postBuild:
    substitute:
      APP: toolhive
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: ai
  timeout: 5m
