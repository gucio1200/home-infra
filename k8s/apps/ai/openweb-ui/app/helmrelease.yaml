---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openweb-ui
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: openweb-ui
  values:
    controllers:
      open-webui:
        pod:
          annotations:
            reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: v0.10.2
            env:
              # Open-webui settings
              WEBUI_URL: https://chat.k8sj.io
              CORS_ALLOW_ORIGIN: https://chat.k8sj.io
              OPENAI_API_BASE_URL: http://litellm:4000/v1
              ENABLE_OPENAI_API: "True"
              ENABLE_OLLAMA_API: "False"
              OLLAMA_BASE_URL: http://ollama:11434
              ENABLE_WEB_SEARCH: true
              ENABLE_SEARCH_QUERY_GENERATION: true
              WEBUI_SESSION_COOKIE_SAME_SITE: lax
              WEBUI_SESSION_COOKIE_SECURE: true
              TOOL_SERVER_CONNECTIONS: '[{"type":"mcp","url":"http://vmcp-mcp-gateway-internal.ai.svc.cluster.local:4483/mcp","spec_type":"url","spec":"","path":"openapi.json","auth_type":"none","key":"","config":{"enable":true},"info":{"id":"mcp-gateway","name":"MCP Gateway","description":""}}]'
              # Searx
              WEB_SEARCH_ENGINE: searxng
              SEARXNG_QUERY_URL: http://searxng.selfhosted.svc.cluster.local:8080/search?q=<query>
              ENABLE_WEBSOCKET_SUPPORT: "true"
              WEBSOCKET_MANAGER: redis
              # Auth
              DEFAULT_USER_ROLE: "admin"
              WEBUI_AUTH: false
              # Image Generation
              ENABLE_IMAGE_GENERATION: false
              IMAGE_SIZE: 400x400
              IMAGE_STEPS: 8
            envFrom: &envFrom
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
              - secretRef:
                  name: openweb-ui-db-secret
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                memory: 2Gi

    service:
      app:
        ports:
          http:
            port: &port 8080

    route:
      app:
        hostnames: ["chat.k8sj.io"]
        parentRefs:
          - name: envoy-internal
            namespace: networking
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/backend/data
      tmpfs:
        type: emptyDir
        advancedMounts:
          open-webui:
            app:
              - path: /tmp
                subPath: tmp
