---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app litellm
  namespace: flux-system
spec:
  targetNamespace: ai
  components:
    - ../../../../components/dragonfly
  dependsOn:
    - name: dragonfly-operator
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  path: ./k8s/apps/ai/litellm/app
  prune: true
  postBuild:
    substitute:
      APP: *app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 1h
  retryInterval: 2m
  timeout: 5m
