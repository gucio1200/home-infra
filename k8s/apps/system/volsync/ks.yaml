---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-volsync-app
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: volsync
  dependsOn:
    - name: cluster-apps-snapshot-controller
  path: ./k8s/apps/system/volsync/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 10m
  retryInterval: 1m
  targetNamespace: system
  timeout: 5m
  wait: true

---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: volsync-maintenance
  namespace: flux-system
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: volsync
  dependsOn:
    - name: cluster-apps-volsync-app
  interval: 1h
  path: "./k8s/apps/system/volsync/maintenance"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: system
  timeout: 5m
